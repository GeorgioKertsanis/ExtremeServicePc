    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --blue: #0084ff; --dark-bg: #050505; --card-bg: rgba(255, 255, 255, 0.05); --glass-border: rgba(255, 255, 255, 0.1); }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Roboto', sans-serif; background: var(--dark-bg); color: white; padding: 50px 20px; text-align: center; }
        h1 { font-family: 'Montserrat', sans-serif; margin-bottom: 40px; color: var(--blue); text-transform: uppercase; }
        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; max-width: 1200px; margin: auto; }
        .g-card { background: var(--card-bg); padding: 10px; border-radius: 15px; border: 1px solid var(--glass-border); }
        .g-card img { width: 100%; height: 250px; object-fit: cover; border-radius: 10px; transition: 0.3s; }
        .g-card img:hover { transform: scale(1.05); }
        .back-btn { display: inline-block; margin-top: 50px; padding: 15px 30px; background: var(--blue); color: white; text-decoration: none; border-radius: 50px; font-weight: bold; }
    </style>
